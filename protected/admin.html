<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #060612; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: rgba(255,255,255,0.9); padding: 2rem 1rem; overflow-x: hidden; }
    .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
    .b1 { width: 500px; height: 500px; background: #7f0000; top: -120px; left: -120px; opacity: 0.5; }
    .b2 { width: 450px; height: 450px; background: #3b0fba; bottom: -80px; right: -80px; opacity: 0.5; }
    .b3 { width: 300px; height: 300px; background: #0e4bbd; top: 40%; left: 60%; opacity: 0.3; }
    .container { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .shield-icon { width: 44px; height: 44px; border-radius: 12px; background: rgba(220,50,50,0.2); box-shadow: 0 0 0 1px rgba(255,100,100,0.3) inset; display: flex; align-items: center; justify-content: center; font-size: 22px; color: rgba(255,180,180,0.95); }
    .topbar-title { font-size: 20px; font-weight: 500; color: rgba(255,255,255,0.95); }
    .topbar-sub { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .btn-logout { display: flex; align-items: center; gap: 6px; padding: 9px 16px; border: none; border-radius: 12px; font-size: 13px; font-weight: 500; color: rgba(255,180,180,0.9); cursor: pointer; background: rgba(200,40,40,0.2); backdrop-filter: blur(20px); box-shadow: 0 0 0 1px rgba(255,100,100,0.25) inset; transition: background 0.2s; }
    .btn-logout:hover { background: rgba(200,40,40,0.35); }
    .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .tab-btn { padding: 9px 20px; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); transition: all 0.2s; box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset; }
    .tab-btn.active { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.95); box-shadow: 0 0 0 1px rgba(255,255,255,0.2) inset; }
    .tab-section { display: none; }
    .tab-section.active { display: block; }
    .card { position: relative; border-radius: 24px; padding: 1.75rem; margin-bottom: 1.25rem; background: rgba(255,255,255,0.06); backdrop-filter: blur(30px) saturate(160%); -webkit-backdrop-filter: blur(30px) saturate(160%); box-shadow: 0 0 0 1px rgba(255,255,255,0.12) inset, 0 2px 0 rgba(255,255,255,0.18) inset, 0 20px 60px rgba(0,0,0,0.4); overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 5%; right: 5%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); }
    .card-title { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.8); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
    .card-title i { font-size: 18px; color: rgba(255,255,255,0.4); }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .glass-input { flex: 1; min-width: 140px; background: rgba(255,255,255,0.08); border: none; border-radius: 12px; padding: 11px 14px; color: rgba(255,255,255,0.95); font-size: 14px; outline: none; box-shadow: 0 0 0 1px rgba(255,255,255,0.12) inset, 0 1px 0 rgba(255,255,255,0.15) inset; transition: box-shadow 0.2s, background 0.2s; }
    .glass-input::placeholder { color: rgba(255,255,255,0.3); }
    .glass-input:focus { background: rgba(255,255,255,0.12); box-shadow: 0 0 0 1px rgba(255,255,255,0.22) inset, 0 1px 0 rgba(255,255,255,0.25) inset, 0 0 0 3px rgba(80,200,120,0.2); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 11px 18px; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; position: relative; overflow: hidden; transition: background 0.2s, transform 0.1s; backdrop-filter: blur(20px); }
    .btn:active { transform: scale(0.97); }
    .btn::before { content: ''; position: absolute; top: 0; left: 5%; right: 5%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); }
    .btn-green { color: rgba(180,255,210,0.95); background: rgba(20,160,80,0.3); box-shadow: 0 0 0 1px rgba(100,255,160,0.2) inset, 0 4px 16px rgba(20,140,70,0.3); }
    .btn-green:hover { background: rgba(20,160,80,0.45); }
    .btn-orange { color: rgba(255,210,160,0.95); background: rgba(200,100,20,0.3); box-shadow: 0 0 0 1px rgba(255,180,80,0.2) inset; font-size: 13px; padding: 8px 14px; }
    .btn-orange:hover { background: rgba(200,100,20,0.45); }
    .btn-red-sm { color: rgba(255,160,160,0.95); background: rgba(200,40,40,0.25); box-shadow: 0 0 0 1px rgba(255,100,100,0.2) inset; font-size: 13px; padding: 8px 14px; }
    .btn-red-sm:hover { background: rgba(200,40,40,0.4); }
    .msg { font-size: 13px; margin-top: 12px; min-height: 20px; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid rgba(255,255,255,0.08); }
    th { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0 12px 12px; text-align: left; }
    td { padding: 14px 12px; font-size: 14px; color: rgba(255,255,255,0.75); border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.03); }
    .username { color: rgba(255,255,255,0.95); font-weight: 500; }
    .badge-bound { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 4px 10px; border-radius: 20px; background: rgba(20,160,80,0.2); color: rgba(100,255,160,0.9); box-shadow: 0 0 0 1px rgba(60,200,100,0.25) inset; }
    .badge-free { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); box-shadow: 0 0 0 1px rgba(255,255,255,0.1) inset; }
    .empty-row td { text-align: center; color: rgba(255,255,255,0.25); padding: 2rem; font-size: 13px; }
    .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: none; border-radius: 10px; font-size: 13px; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.06); cursor: pointer; margin-bottom: 1rem; transition: background 0.2s, color 0.2s; }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
    .avatar { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; background: rgba(255,255,255,0.08); }
    .actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="container">
    <div class="topbar">
      <div class="topbar-left">
        <div class="shield-icon"><i class="ti ti-shield-lock"></i></div>
        <div>
          <div class="topbar-title">Panel administratora</div>
          <div class="topbar-sub">Zarządzanie użytkownikami</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">
        <i class="ti ti-logout"></i> Wyloguj
      </button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('users', this)">
        <i class="ti ti-users"></i> Użytkownicy
      </button>
      <button class="tab-btn" onclick="switchTab('logs', this)">
        <i class="ti ti-history"></i> Historia kart
      </button>
    </div>

    <!-- TAB: USERS -->
    <div id="tab-users" class="tab-section active">
      <div class="card">
        <div class="card-title"><i class="ti ti-user-plus"></i> Dodaj nowego użytkownika</div>
        <div class="form-row">
          <input class="glass-input" type="text" id="newUsername" placeholder="Login" />
          <input class="glass-input" type="password" id="newPassword" placeholder="Hasło" />
          <button class="btn btn-green" onclick="addUser()"><i class="ti ti-plus"></i> Dodaj</button>
        </div>
        <p class="msg" id="message"></p>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-users"></i> Wszyscy użytkownicy</div>
        <button class="refresh-btn" onclick="loadUsers()">
          <i class="ti ti-refresh" id="refreshIcon"></i> Odśwież
        </button>
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Login</th><th>Status</th><th>Data dodania</th><th>Akcje</th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <tr class="empty-row"><td colspan="5">Ładowanie...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TAB: LOGS -->
    <div id="tab-logs" class="tab-section">
      <div class="card">
        <div class="card-title"><i class="ti ti-history"></i> Historia generowania kart</div>
        <button class="refresh-btn" onclick="loadLogs()">
          <i class="ti ti-refresh" id="refreshLogsIcon"></i> Odśwież
        </button>
        <table>
          <thead>
            <tr>
              <th>Zdjęcie</th><th>Użytkownik</th><th>Imię</th><th>Nazwisko</th><th>Dodatkowe dane</th><th>Data</th>
            </tr>
          </thead>
          <tbody id="logsTable">
            <tr class="empty-row"><td colspan="6">Kliknij Odśwież aby załadować...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
      if (tab === 'logs') loadLogs();
      if (tab === 'users') loadUsers();
    }

    async function loadUsers() {
      const icon = document.getElementById('refreshIcon');
      icon.style.animation = 'spin 0.6s linear infinite';
      const res = await fetch('/api/admin/users');
      const users = await res.json();
      icon.style.animation = '';
      const tbody = document.getElementById('usersTable');
      tbody.innerHTML = '';
      if (users.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Brak użytkowników</td></tr>';
        return;
      }
      users.forEach(user => {
        const bound = user.device_token !== null;
        const date = new Date(user.created_at).toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' });
        tbody.innerHTML += `
          <tr>
            <td style="color:rgba(255,255,255,0.3)">${user.id}</td>
            <td class="username">${user.username}</td>
            <td>${bound
              ? '<span class="badge-bound"><i class="ti ti-device-mobile"></i> Zbindowane</span>'
              : '<span class="badge-free"><i class="ti ti-circle-dashed"></i> Wolne</span>'
            }</td>
            <td style="color:rgba(255,255,255,0.4)">${date}</td>
            <td class="actions-cell">
              ${bound ? `<button class="btn btn-orange" onclick="resetDevice(${user.id})"><i class="ti ti-refresh"></i> Reset</button>` : ''}
              <button class="btn btn-red-sm" onclick="deleteUser(${user.id}, '${user.username}')"><i class="ti ti-trash"></i> Usuń</button>
            </td>
          </tr>
        `;
      });
    }

    async function loadLogs() {
      const icon = document.getElementById('refreshLogsIcon');
      icon.style.animation = 'spin 0.6s linear infinite';
      const res = await fetch('/api/admin/card-logs');
      const logs = await res.json();
      icon.style.animation = '';
      const tbody = document.getElementById('logsTable');
      tbody.innerHTML = '';
      if (logs.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Brak historii</td></tr>';
        return;
      }
      logs.forEach(log => {
        const extra = log.extra_data || {};
        const skip = ['name','surname','image','first_name','last_name','image_url'];
        const extraHtml = Object.entries(extra)
          .filter(([k]) => !skip.includes(k) && extra[k])
          .map(([k, v]) => `<div style="font-size:12px;color:rgba(255,255,255,0.5)"><span style="color:rgba(255,255,255,0.3)">${k}:</span> ${v}</div>`)
          .join('');
        tbody.innerHTML += `
          <tr>
            <td>${log.image_url
              ? `<img class="avatar" src="${log.image_url}" onerror="this.style.opacity='0.2'" />`
              : '<div class="avatar" style="display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.2)">brak</div>'
            }</td>
            <td class="username">${log.username}</td>
            <td>${log.first_name || '—'}</td>
            <td>${log.last_name || '—'}</td>
            <td>${extraHtml || '<span style="color:rgba(255,255,255,0.2)">—</span>'}</td>
            <td style="color:rgba(255,255,255,0.4);font-size:13px">${new Date(log.created_at).toLocaleString('pl-PL')}</td>
          </tr>
        `;
      });
    }

    async function addUser() {
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      const msg = document.getElementById('message');
      if (!username || !password) {
        msg.style.color = 'rgba(255,100,100,0.85)';
        msg.textContent = 'Wypełnij oba pola.';
        return;
      }
      const res = await fetch('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok) {
        msg.style.color = 'rgba(100,255,160,0.85)';
        msg.textContent = 'Użytkownik "' + username + '" dodany!';
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        loadUsers();
      } else {
        msg.style.color = 'rgba(255,100,100,0.85)';
        msg.textContent = data.error || 'Błąd dodawania.';
      }
    }

    async function resetDevice(id) {
      if (!confirm('Na pewno zresetować urządzenie tego użytkownika?')) return;
      await fetch('/api/admin/users/' + id + '/reset', { method: 'POST' });
      loadUsers();
    }

    async function deleteUser(id, username) {
      if (!confirm('Na pewno USUNĄĆ konto "' + username + '"?\n\nTej operacji NIE MOŻNA cofnąć!')) return;
      const res = await fetch('/api/admin/users/' + id, { method: 'DELETE' });
      if (res.ok) {
        loadUsers();
      } else {
        alert('Błąd podczas usuwania!');
      }
    }

    async function logout() {
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/admin-login.html';
    }

    loadUsers();
  </script>
</body>
</html>
