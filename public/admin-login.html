<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a2e; }
    .box { background: white; padding: 40px; border-radius: 12px; width: 320px; }
    h1 { margin-top: 0; color: #333; }
    input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button { width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:hover { background: #c0392b; }
    #message { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🔐 Admin Panel</h1>
    <input type="password" id="password" placeholder="Admin password" />
    <button onclick="login()">Login</button>
    <p id="message"></p>
  </div>
  <script>
    async function login() {
      const password = document.getElementById('password').value;
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = '/admin';
      } else {
        document.getElementById('message').textContent = data.error;
      }
    }
  </script>
</body>
</html>
