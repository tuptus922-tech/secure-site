<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #060612;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
    }
    .b1 { width: 500px; height: 500px; background: #3b0fba; top: -120px; left: -120px; opacity: 0.7; }
    .b2 { width: 450px; height: 450px; background: #0e4bbd; bottom: -80px; right: -80px; opacity: 0.7; }
    .b3 { width: 320px; height: 320px; background: #7c1fa8; top: 40%; left: 45%; opacity: 0.5; }
    .b4 { width: 250px; height: 250px; background: #0891b2; top: 15%; right: 20%; opacity: 0.4; }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 380px;
      margin: 1rem;
      border-radius: 28px;
      padding: 2.5rem 2rem;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.15) inset,
        0 2px 0 rgba(255,255,255,0.25) inset,
        0 -1px 0 rgba(0,0,0,0.3) inset,
        0 32px 80px rgba(0,0,0,0.5),
        0 8px 32px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 5%; right: 5%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%);
      border-radius: 28px 28px 0 0;
      pointer-events: none;
    }

    .lock-wrap {
      width: 56px; height: 56px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.2) inset,
        0 1px 0 rgba(255,255,255,0.35) inset;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: rgba(255,255,255,0.9);
    }

    h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      color: rgba(255,255,255,0.95);
      margin-bottom: 1.75rem;
      letter-spacing: -0.01em;
    }

    .field {
      position: relative;
      margin-bottom: 12px;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 14px;
      padding: 12px 14px 12px 42px;
      color: rgba(255,255,255,0.95);
      font-size: 15px;
      outline: none;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12) inset,
        0 1px 0 rgba(255,255,255,0.18) inset;
      transition: box-shadow 0.2s, background 0.2s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .field input::placeholder { color: rgba(255,255,255,0.3); }

    .field input:focus {
      background: rgba(255,255,255,0.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.25) inset,
        0 1px 0 rgba(255,255,255,0.3) inset,
        0 0 0 3px rgba(120,100,255,0.25);
    }

    .field i {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 17px;
      pointer-events: none;
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.95);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: rgba(100,80,255,0.35);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.2) inset,
        0 1px 0 rgba(255,255,255,0.3) inset,
        0 4px 20px rgba(80,60,220,0.4);
      transition: box-shadow 0.2s, background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: 5%; right: 5%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    }

    .btn:hover {
      background: rgba(100,80,255,0.48);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.25) inset,
        0 1px 0 rgba(255,255,255,0.35) inset,
        0 6px 28px rgba(80,60,220,0.55);
    }

    .btn:active { transform: scale(0.98); }

    .msg {
      text-align: center;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
      color: rgba(255,100,100,0.85);
    }

    .sep {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0 0.75rem;
    }
    .sep-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .sep-text { font-size: 11px; color: rgba(255,255,255,0.2); }

    .admin-link {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }
    .admin-link a {
      color: rgba(180,160,255,0.7);
      text-decoration: none;
      transition: color 0.2s;
    }
    .admin-link a:hover { color: rgba(200,185,255,0.95); }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>

  <div class="card">
    <div class="lock-wrap"><i class="ti ti-lock"></i></div>
    <h1>Zaloguj się</h1>

    <div class="field">
      <i class="ti ti-user"></i>
      <input type="text" id="username" placeholder="Login" autocomplete="username" />
    </div>

    <div class="field">
      <i class="ti ti-key"></i>
      <input type="password" id="password" placeholder="Hasło" autocomplete="current-password" />
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">
      <i class="ti ti-arrow-right"></i> Zaloguj się
    </button>

    <p class="msg" id="msg"></p>

    <div class="sep">
      <div class="sep-line"></div>
      <span class="sep-text">admin</span>
      <div class="sep-line"></div>
    </div>
    <div class="admin-link"><a href="/admin-login.html">Panel administratora →</a></div>
  </div>

  <script>
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('msg');

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showMsg('Wypełnij wszystkie pola.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader-2" style="animation: spin 1s linear infinite;"></i> Logowanie...';
      msg.textContent = '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          btn.innerHTML = '<i class="ti ti-check"></i> Zalogowano!';
          btn.style.background = 'rgba(20,180,100,0.35)';
// Zapisz token do localStorage dla autologinu
try {
  const cookies = document.cookie.split(';');
  const tokenCookie = cookies.find(c => c.trim().startsWith('device_token='));
  if (tokenCookie) {
    localStorage.setItem('auth_token', tokenCookie.split('=')[1].trim());
  }
} catch(e) {}
setTimeout(() => { window.location.href = '/site'; }, 600);
        } else {
          showMsg(data.error || 'Błąd logowania.', 'error');
          resetBtn();
        }
      } catch (err) {
        showMsg('Błąd połączenia z serwerem.', 'error');
        resetBtn();
      }
    }

    function showMsg(text, type) {
      msg.textContent = text;
      msg.style.color = type === 'error' ? 'rgba(255,100,100,0.85)' : 'rgba(100,255,160,0.85)';
    }

    function resetBtn() {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-arrow-right"></i> Zaloguj się';
      btn.style.background = '';
    }
  </script>

  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</body>
</html>
