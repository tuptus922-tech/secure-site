<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Logowanie</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>

  <div class="card">
    <div class="glass-shine"></div>
    <div class="lock-wrap"><i class="ti ti-lock"></i></div>
    <h1>Zaloguj się</h1>

    <div class="field">
      <i class="ti ti-user"></i>
      <input type="text" id="username" placeholder="Login" autocomplete="username" />
    </div>

    <div class="field">
      <i class="ti ti-key"></i>
      <input type="password" id="password" placeholder="Hasło" autocomplete="current-password" />
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">
      <i class="ti ti-arrow-right"></i> Zaloguj się
    </button>

    <p class="msg" id="msg"></p>

    <div class="sep">
      <div class="sep-line"></div>
      <span class="sep-text">admin</span>
      <div class="sep-line"></div>
    </div>
    <div class="admin-link"><a href="/admin-login.html">Panel administratora →</a></div>
  </div>

  <script>
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('msg');

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showMsg('Wypełnij wszystkie pola.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader-2" style="animation: spin 1s linear infinite;"></i> Logowanie...';
      msg.textContent = '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          btn.innerHTML = '<i class="ti ti-check"></i> Zalogowano!';
          btn.style.background = 'rgba(20,180,100,0.4)';
          if (data.token) localStorage.setItem('auth_token', data.token);
          setTimeout(() => { window.location.href = '/site'; }, 600);
        } else {
          showMsg(data.error || 'Błąd logowania.', 'error');
          resetBtn();
        }
      } catch (err) {
        showMsg('Błąd połączenia z serwerem.', 'error');
        resetBtn();
      }
    }

    function showMsg(text, type) {
      msg.textContent = text;
      msg.style.color = type === 'error' ? 'rgba(255,100,100,0.9)' : 'rgba(100,255,160,0.9)';
    }

    function resetBtn() {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-arrow-right"></i> Zaloguj się';
      btn.style.background = '';
    }
  </script>
</body>
</html>
